<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2230"/>
      <stop offset="1" stop-color="#0d0f16"/>
    </linearGradient>
    <linearGradient id="leftPane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#3a4258"/>
      <stop offset="1" stop-color="#232838"/>
    </linearGradient>
    <linearGradient id="rightPane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3146"/>
      <stop offset="1" stop-color="#1a1d2b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#7c8cff"/>
      <stop offset="1" stop-color="#4d60ff"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dx="0" dy="8" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rounded tile background (macOS icon squircle) -->
  <rect x="112" y="112" width="800" height="800" rx="180" ry="180" fill="url(#bg)"/>

  <!-- subtle top inner highlight -->
  <rect x="112" y="112" width="800" height="240" rx="180" ry="180"
        fill="#ffffff" opacity="0.03"/>

  <!-- left pane (active: accent border) -->
  <g filter="url(#softShadow)">
    <rect x="188" y="272" width="300" height="480" rx="28" ry="28" fill="url(#leftPane)"/>
  </g>
  <rect x="188" y="272" width="300" height="480" rx="28" ry="28"
        fill="none" stroke="url(#accent)" stroke-width="6"/>
  <!-- header bar -->
  <rect x="212" y="296" width="252" height="22" rx="6" ry="6" fill="#ffffff" opacity="0.08"/>
  <!-- rows -->
  <g fill="#ffffff" opacity="0.55">
    <rect x="212" y="348" width="180" height="14" rx="3"/>
    <rect x="212" y="378" width="230" height="14" rx="3"/>
    <rect x="212" y="408" width="160" height="14" rx="3"/>
    <rect x="212" y="438" width="210" height="14" rx="3"/>
    <rect x="212" y="468" width="140" height="14" rx="3"/>
  </g>
  <!-- cursor highlight on left pane -->
  <rect x="204" y="402" width="268" height="26" rx="4" fill="url(#accent)" opacity="0.35"/>
  <rect x="212" y="408" width="160" height="14" rx="3" fill="#ffffff"/>

  <!-- right pane (inactive) -->
  <g filter="url(#softShadow)">
    <rect x="536" y="272" width="300" height="480" rx="28" ry="28" fill="url(#rightPane)"/>
  </g>
  <rect x="536" y="272" width="300" height="480" rx="28" ry="28"
        fill="none" stroke="#ffffff" stroke-width="3" stroke-opacity="0.12"/>
  <rect x="560" y="296" width="252" height="22" rx="6" ry="6" fill="#ffffff" opacity="0.05"/>
  <g fill="#ffffff" opacity="0.32">
    <rect x="560" y="348" width="200" height="14" rx="3"/>
    <rect x="560" y="378" width="150" height="14" rx="3"/>
    <rect x="560" y="408" width="220" height="14" rx="3"/>
    <rect x="560" y="438" width="170" height="14" rx="3"/>
    <rect x="560" y="468" width="190" height="14" rx="3"/>
  </g>

  <!-- caret arrow between panes (dual-pane motif) -->
  <g fill="url(#accent)">
    <polygon points="498,490 530,512 498,534"/>
    <polygon points="526,490 494,512 526,534"/>
  </g>
</svg>
